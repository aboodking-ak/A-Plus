name: a_plus
description: "Educational App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pdfrx: ^2.4.1
  google_generative_ai: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/auth/
    - assets/icons/stages/
    - assets/icons/subjects/
    - assets/icons/logo/
    - assets/pdfs/subjects/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/tajawal/tajawal-black.ttf
        - asset: assets/fonts/tajawal/tajawal-bold.ttf
        - asset: assets/fonts/tajawal/tajawal-extrabold.ttf
        - asset: assets/fonts/tajawal/tajawal-extralight.ttf
        - asset: assets/fonts/tajawal/tajawal-light.ttf
        - asset: assets/fonts/tajawal/tajawal-medium.ttf
        - asset: assets/fonts/tajawal/tajawal-regular.ttf
